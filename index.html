<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0a0a0a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="description" content="NEXUS — Minimal internet speed test"/>
<link rel="manifest" href="manifest.json"/>
<title>NEXUS — Speed Test</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-user-select:none;}
:root{
  --bg:#0a0a0a;--border:#1e1e1e;--accent:#e8ff47;
  --muted:#1c1c1c;--text:#f0f0f0;--dim:#555;--red:#ff4444;
  --dl:#47ffb2;--ul:#47c8ff;--ping:#e8ff47;
  --grid:rgba(255,255,255,0.013);
}
:root.light{
  --bg:#f4f4f4;--border:#d0d0d0;--accent:#111;
  --muted:#c8c8c8;--text:#111;--dim:#888;--red:#cc2222;
  --dl:#007a4d;--ul:#005fa3;--ping:#444;
  --grid:rgba(0,0,0,0.04);
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:'Space Mono',monospace;-webkit-font-smoothing:antialiased;touch-action:manipulation;}
body{display:flex;flex-direction:column;align-items:center;
  min-height:100svh;padding:0 18px 44px;overflow-x:hidden;position:relative;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:40px 40px;}

/* ── HEADER ──────────────────────────────────────────────── */
.header{width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:16px 0;position:relative;z-index:10;flex-shrink:0;}
.wordmark{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.35em;color:var(--dim);}
.status-badge{font-size:9px;letter-spacing:.15em;border:1px solid var(--border);
  color:var(--dim);padding:3px 10px;display:flex;align-items:center;gap:6px;transition:all .3s;}
.status-badge.running{background:var(--accent);border-color:var(--accent);color:#000;}
.status-badge.done{border-color:var(--accent);color:var(--accent);}
:root.light .status-badge.running{background:#111;border-color:#111;color:#fff;}
:root.light .status-badge.done{border-color:#111;color:#111;}
.sbdot{width:5px;height:5px;border-radius:50%;background:currentColor;}
.sbdot.pulse{animation:blink 1.2s ease infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}

/* ── OPEN ARC GAUGE ──────────────────────────────────────── */
.arc-wrap{position:relative;z-index:10;width:min(290px,86vw);
  margin-bottom:-20px;flex-shrink:0;}
#arc-svg{width:100%;height:auto;overflow:visible;}
#arc-track{transition:stroke .3s;}
#arc-prog{transition:stroke-dashoffset .28s cubic-bezier(.4,0,.2,1),stroke .35s ease;}

/* ── BIG NUMBER ──────────────────────────────────────────── */
.num-block{text-align:center;line-height:1;position:relative;z-index:10;flex-shrink:0;}
.phase-lbl{font-size:9px;letter-spacing:.3em;color:var(--dim);
  text-transform:uppercase;margin-bottom:2px;min-height:13px;transition:color .3s;}
.phase-lbl.dl{color:var(--dl);}
.phase-lbl.ul{color:var(--ul);}
.phase-lbl.ping{color:var(--ping);}
.phase-lbl.jitter{color:var(--ping);}
.big-num.jitter{color:var(--ping);text-shadow:0 0 60px rgba(232,255,71,.12);}
:root.light .big-num.jitter{text-shadow:none!important;}
.unit-lbl.jitter{color:var(--ping);}
.big-num{font-family:'Bebas Neue',sans-serif;
  font-size:clamp(84px,23vw,124px);font-style:italic;letter-spacing:-4px;
  color:var(--text);display:block;transition:color .4s;}
.big-num.dl{color:var(--dl);text-shadow:0 0 60px rgba(71,255,178,.12);}
.big-num.ul{color:var(--ul);text-shadow:0 0 60px rgba(71,200,255,.12);}
.big-num.ping{color:var(--ping);text-shadow:0 0 60px rgba(232,255,71,.12);}
:root.light .big-num{text-shadow:none!important;}
.unit-lbl{font-size:10px;letter-spacing:.28em;color:var(--dim);
  margin-bottom:14px;display:block;transition:color .3s;}
.unit-lbl.dl{color:var(--dl);}
.unit-lbl.ul{color:var(--ul);}
.unit-lbl.ping{color:var(--ping);}

/* ── STATS GRID ──────────────────────────────────────────── */
.stats{width:100%;display:grid;
  grid-template-columns:1fr 1px 1fr 1px 1fr 1px 1fr;
  border:1px solid var(--border);margin-bottom:10px;
  position:relative;z-index:10;flex-shrink:0;}
.sdiv{background:var(--border);}
.stat{padding:10px 5px;text-align:center;cursor:pointer;transition:background .2s;}
.stat:hover{background:rgba(255,255,255,.03);}
.stat-active{background:rgba(232,255,71,.05)!important;border-bottom:2px solid var(--accent);}
:root.light .stat-active{background:rgba(0,0,0,.04)!important;border-bottom:2px solid #111;}
.sv{font-family:'Bebas Neue',sans-serif;font-size:20px;
  color:var(--text);display:block;line-height:1;margin-bottom:3px;transition:color .4s;}
.sv.dl{color:var(--dl);}
.sv.ul{color:var(--ul);}
.sl{font-size:7.5px;color:var(--dim);letter-spacing:.18em;text-transform:uppercase;}

/* ── PROGRESS BAR ────────────────────────────────────────── */
.prog-row{width:100%;display:flex;align-items:center;
  gap:10px;margin-bottom:10px;position:relative;z-index:10;flex-shrink:0;}
.prog-lbl{font-size:9px;letter-spacing:.2em;color:var(--dim);white-space:nowrap;min-width:52px;}
.prog-track{flex:1;height:2px;background:var(--muted);}
.prog-fill{height:100%;background:var(--accent);width:0%;transition:width .4s ease,background .3s;}
.prog-fill.dl{background:var(--dl);}
.prog-fill.ul{background:var(--ul);}
.prog-pct{font-size:9px;color:var(--dim);min-width:30px;text-align:right;}

/* ── INFO PANEL (Ookla-style) ────────────────────────────── */
.info-panel{
  width:100%;border:1px solid var(--border);
  display:grid;grid-template-columns:1fr 1px 1fr;
  margin-bottom:10px;position:relative;z-index:10;flex-shrink:0;
}
.info-col{padding:10px 12px;min-width:0;}
.info-row{display:flex;align-items:baseline;gap:6px;margin-bottom:5px;}
.info-row:last-child{margin-bottom:0;}
.info-label{font-size:7.5px;letter-spacing:.18em;color:var(--dim);
  text-transform:uppercase;white-space:nowrap;flex-shrink:0;}
.info-val{font-family:'Bebas Neue',sans-serif;font-size:13px;
  color:var(--text);letter-spacing:.05em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.info-val.accent{color:var(--accent);}
:root.light .info-val.accent{color:#111;}

/* ── SERVER ROW ──────────────────────────────────────────── */
.srv-row{width:100%;display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;position:relative;z-index:10;flex-shrink:0;}
.srv-info{font-size:8.5px;color:var(--dim);letter-spacing:.12em;}
.srv-info span{color:var(--text);}

/* ── BUTTON ──────────────────────────────────────────────── */
.run-btn{width:100%;padding:14px;
  background:#e8ff47;border:1px solid #e8ff47;color:#000;
  font-family:'Space Mono',monospace;font-size:11px;
  letter-spacing:.3em;cursor:pointer;
  transition:background .25s,color .25s,border-color .25s;
  text-transform:uppercase;position:relative;z-index:10;flex-shrink:0;}
:root.light .run-btn{background:#111;border-color:#111;color:#fff;}
.run-btn:active{transform:scale(.99);}
.run-btn.running{background:var(--bg);border:1px solid var(--border);color:var(--text);}
:root.light .run-btn.running{background:var(--bg);border-color:#bbb;color:#111;}
.rdot{width:6px;height:6px;border-radius:50%;background:var(--dim);
  display:inline-block;margin-right:8px;transition:background .3s;vertical-align:middle;}
.rdot.on{background:var(--accent);box-shadow:0 0 6px var(--accent);animation:blink 1.5s infinite;}
:root.light .run-btn .rdot.on{background:#e8ff47;box-shadow:0 0 6px #e8ff47;}
.err-msg{font-size:9px;color:var(--red);letter-spacing:.15em;
  text-align:center;margin-top:8px;min-height:14px;position:relative;z-index:10;}

/* ── THEME BTN ───────────────────────────────────────────── */
#theme-btn{position:fixed;bottom:18px;left:18px;
  font-family:'Space Mono',monospace;font-size:12px;
  color:var(--dim);background:transparent;
  border:1px solid #2a2a2a;padding:8px 10px;
  cursor:pointer;transition:color .2s,border-color .2s;z-index:50;line-height:1;}
:root.light #theme-btn{border-color:#bbb;color:#555;}
#theme-btn:hover{color:var(--accent);border-color:var(--accent);}

@keyframes fadeSlide{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.flash{animation:fadeSlide .35s ease forwards;}
</style>
</head>
<body>

<div class="header">
  <div class="wordmark">NEXUS</div>
  <div class="status-badge" id="status-badge">
    <div class="sbdot" id="sbdot"></div>
    <span id="status-lbl">READY</span>
  </div>
</div>

<!-- Open arc gauge — VELOX-style half-arc, not a full circle -->
<div class="arc-wrap">
  <svg id="arc-svg" viewBox="0 0 290 168">
    <path id="arc-track" d="" stroke="#1e1e1e" stroke-width="3" fill="none" stroke-linecap="butt"/>
    <path id="arc-prog"  d="" stroke="#e8ff47" stroke-width="7" fill="none" stroke-linecap="round"
      stroke-dasharray="1" stroke-dashoffset="1"/>
  </svg>
</div>

<!-- Big italic speed number -->
<div class="num-block">
  <div class="phase-lbl" id="phase-lbl">TAP TO BEGIN</div>
  <span class="big-num" id="big-num">—</span>
  <span class="unit-lbl" id="unit-lbl">MBPS</span>
</div>

<!-- Stats: down, up, ping, jitter -->
<div class="stats">
  <div class="stat" onclick="showTab('dl')" title="Show download"><span class="sv" id="sv-dl">—</span><span class="sl">↓ DOWN</span></div>
  <div class="sdiv"></div>
  <div class="stat" onclick="showTab('ul')" title="Show upload"><span class="sv" id="sv-ul">—</span><span class="sl">↑ UP</span></div>
  <div class="sdiv"></div>
  <div class="stat" onclick="showTab('ping')" title="Show ping"><span class="sv" id="sv-ping">—</span><span class="sl">PING MS</span></div>
  <div class="sdiv"></div>
  <div class="stat" onclick="showTab('jitter')" title="Show jitter"><span class="sv" id="sv-jitter">—</span><span class="sl">JITTER</span></div>
</div>

<!-- Progress bar -->
<div class="prog-row">
  <span class="prog-lbl" id="prog-lbl">IDLE</span>
  <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
  <span class="prog-pct" id="prog-pct">—</span>
</div>

<!-- Info panel: ISP + IP / Server + Location -->
<div class="info-panel">
  <div class="info-col">
    <div class="info-row">
      <span class="info-label">ISP</span>
      <span class="info-val accent" id="inf-isp">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">ORG</span>
      <span class="info-val" id="inf-org">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">IP</span>
      <span class="info-val" id="inf-ip">—</span>
    </div>
  </div>
  <div class="sdiv"></div>
  <div class="info-col">
    <div class="info-row">
      <span class="info-label">CITY</span>
      <span class="info-val accent" id="inf-city">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">COUNTRY</span>
      <span class="info-val" id="inf-country">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">SERVER</span>
      <span class="info-val" id="inf-colo">—</span>
    </div>
  </div>
</div>

<!-- Run button -->
<button class="run-btn" id="run-btn" onclick="toggleTest()">
  <span class="rdot" id="rdot"></span>RUN TEST
</button>
<div class="err-msg" id="err-msg"></div>

<button id="theme-btn" onclick="toggleTheme()">☀</button>



<script>
/**
 * NEXUS SpeedTest Engine v3
 * - Adaptive sizing: skips payload sizes that would take too long on slow connections
 * - Time-boxed: whole DL+UL completes in ~15-20s regardless of connection speed
 * - IP meta via ipapi.co (HTTPS — no mixed-content block)
 */
'use strict';

const CF_DOWN  = 'https://speed.cloudflare.com/__down';
const CF_UP    = 'https://speed.cloudflare.com/__up';
const CF_TRACE = 'https://speed.cloudflare.com/cdn-cgi/trace';
// IP geo sources tried in order until one succeeds
const GEO_SOURCES = [
  'https://freeipapi.com/api/json',
  'https://ipwho.is/',
];

// All candidate sizes — engine will skip ones too large for the connection
const DL_SIZES_ALL = [100000, 1000000, 5000000, 10000000, 25000000];
const UL_SIZES_ALL = [100000, 1000000, 5000000, 10000000];
const LATENCY_ROUNDS = 8;

// Per-fetch time budget (ms) — skip a size if previous round exceeded this
const FETCH_BUDGET_MS = 4500;
// Minimum rounds to get a result even on very slow connections
const MIN_ROUNDS = 3;

/* ── Latency ─────────────────────────────────────────────────── */
async function measureLatency(onProgress) {
  const samples = [];
  for (let i = 0; i < LATENCY_ROUNDS; i++) {
    const t0 = performance.now();
    try {
      await fetch(`${CF_DOWN}?bytes=0&r=${Math.random()}`, {
        cache: 'no-store', signal: AbortSignal.timeout(5000),
      });
    } catch (_) {}
    samples.push(performance.now() - t0);
    onProgress && onProgress(i + 1, LATENCY_ROUNDS, samples[samples.length - 1]);
    await sleep(50);
  }
  const avg    = median(samples);
  const jitter = samples.reduce((a, b, i, arr) =>
    i === 0 ? 0 : a + Math.abs(b - arr[i - 1]), 0) / Math.max(1, samples.length - 1);
  return { avg, jitter, samples };
}

/* ── Download (adaptive) ─────────────────────────────────────── */
async function measureDownload(onSample, onProgress, signal) {
  const results = [];
  let lastElapsedMs = 0;
  let done = 0;

  // Build adaptive size list: always start with first two, skip if last round was slow
  const sizes = buildAdaptiveSizes(DL_SIZES_ALL);
  const total = sizes.length;

  for (const size of sizes) {
    if (signal?.aborted) break;
    // Skip this size if last fetch already exceeded budget (connection too slow)
    if (done >= MIN_ROUNDS && lastElapsedMs > FETCH_BUDGET_MS) break;

    const t0 = performance.now();
    try {
      const res = await fetch(`${CF_DOWN}?bytes=${size}&r=${Math.random()}`, {
        cache: 'no-store',
        signal: combineSignals(signal, AbortSignal.timeout(FETCH_BUDGET_MS + 1000)),
      });
      const buf = await res.arrayBuffer();
      lastElapsedMs = performance.now() - t0;
      const bps = (buf.byteLength * 8) / (lastElapsedMs / 1000);
      results.push(bps);
      done++;
      onSample && onSample(bps, buf.byteLength, lastElapsedMs / 1000);
      onProgress && onProgress(done, total, bps);
    } catch (e) {
      if (e.name === 'AbortError') return results;
      done++;
      onProgress && onProgress(done, total, 0);
    }
    await sleep(60);
  }
  return results;
}

/* ── Upload (adaptive) ───────────────────────────────────────── */
async function measureUpload(onSample, onProgress, signal) {
  const results = [];
  let lastElapsedMs = 0;
  let done = 0;

  const sizes = buildAdaptiveSizes(UL_SIZES_ALL);
  const total = sizes.length;

  for (const size of sizes) {
    if (signal?.aborted) break;
    if (done >= MIN_ROUNDS && lastElapsedMs > FETCH_BUDGET_MS) break;

    const payload = new Uint8Array(size);
    // Randomise only first 64KB to keep it fast
    crypto.getRandomValues(payload.slice(0, Math.min(size, 65536)));

    const t0 = performance.now();
    try {
      await fetch(CF_UP, {
        method: 'POST', body: payload, cache: 'no-store',
        signal: combineSignals(signal, AbortSignal.timeout(FETCH_BUDGET_MS + 1000)),
      });
      lastElapsedMs = performance.now() - t0;
      const bps = (size * 8) / (lastElapsedMs / 1000);
      results.push(bps);
      done++;
      onSample && onSample(bps, size, lastElapsedMs / 1000);
      onProgress && onProgress(done, total, bps);
    } catch (e) {
      if (e.name === 'AbortError') return results;
      done++;
      onProgress && onProgress(done, total, 0);
    }
    await sleep(60);
  }
  return results;
}

/* ── Server / IP meta ────────────────────────────────────────── */
async function fetchMeta() {
  const result = { colo: '—', city: '—', isp: '—', org: '—', ip: '—', country: '—' };

  // Cloudflare trace — always works, gives colo + IP
  try {
    const t = await (await fetch(CF_TRACE, {
      cache: 'no-store', signal: AbortSignal.timeout(4000),
    })).text();
    result.colo = t.match(/colo=([A-Z]+)/)?.[1]?.trim()  || '—';
    result.ip   = t.match(/ip=([^\n]+)/)?.[1]?.trim() || '—';
  } catch (_) {}

  // Try geo sources in order until one returns valid data
  for (const url of GEO_SOURCES) {
    try {
      const d = await (await fetch(url, {
        cache: 'no-store', signal: AbortSignal.timeout(5000),
      })).json();

      // freeipapi.com schema
      if (url.includes('freeipapi') && d.ipVersion) {
        result.ip      = d.ipAddress   || result.ip;
        result.isp     = d.ispName     || d.org || '—';
        result.org     = d.ispName     || '—';
        result.city    = d.cityName    || '—';
        result.country = d.countryName || '—';
        break;
      }
      // ipwho.is schema
      if (url.includes('ipwho') && d.success) {
        result.ip      = d.ip          || result.ip;
        result.isp     = d.connection?.isp || d.org || '—';
        result.org     = d.connection?.org || d.connection?.isp || '—';
        result.city    = d.city        || '—';
        result.country = d.country     || '—';
        break;
      }
    } catch (_) {}
  }

  return result;
}

/* ── Helpers ─────────────────────────────────────────────────── */
function buildAdaptiveSizes(all) {
  // Always include at least the first 3 sizes, rest are candidates
  return [...all]; // adaptive skipping happens at runtime via lastElapsedMs check
}
function median(arr) {
  if (!arr.length) return 0;
  const s = [...arr].sort((a, b) => a - b);
  const m = Math.floor(s.length / 2);
  return s.length % 2 ? s[m] : (s[m - 1] + s[m]) / 2;
}
function trimmedMean(arr, f = 0.15) {
  if (!arr.length) return 0;
  const s   = [...arr].sort((a, b) => a - b);
  const cut = Math.floor(s.length * f);
  const tr  = s.slice(cut, s.length - cut || undefined);
  if (!tr.length) return s[Math.floor(s.length / 2)];
  return tr.reduce((a, b) => a + b, 0) / tr.length;
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function combineSignals(s1, s2) {
  if (!s1) return s2;
  if (typeof AbortSignal.any === 'function') return AbortSignal.any([s1, s2]);
  return s1;
}

window.NexusEngine = {
  measureLatency, measureDownload, measureUpload, fetchMeta,
  median, trimmedMean,
  DL_TOTAL: DL_SIZES_ALL.length,
  UL_TOTAL: UL_SIZES_ALL.length,
};

</script>
<script>
/**
 * NEXUS App Controller v3
 * 4-phase arc sweep: Download → Upload → Ping → Jitter
 * Each phase sweeps the arc 0→100% then briefly holds before the next.
 * Arc fraction and display number animate independently and smoothly.
 */
'use strict';

// ── Arc geometry ──────────────────────────────────────────────
const CX=145, CY=158, R=122, A0=215, A1=505, ASWEEP=290;

function polar(deg,r){
  const rad=(deg-90)*Math.PI/180;
  return {x:CX+r*Math.cos(rad), y:CY+r*Math.sin(rad)};
}
function arcD(s,e){
  const p1=polar(s,R), p2=polar(e,R);
  return `M ${p1.x.toFixed(2)} ${p1.y.toFixed(2)} A ${R} ${R} 0 ${(e-s)>180?1:0} 1 ${p2.x.toFixed(2)} ${p2.y.toFixed(2)}`;
}
function buildArc(){
  const light=document.documentElement.classList.contains('light');
  const track=document.getElementById('arc-track');
  const prog =document.getElementById('arc-prog');
  const full=arcD(A0,A1);
  track.setAttribute('d',full);
  track.setAttribute('stroke',light?'#ccc':'#1e1e1e');
  prog.setAttribute('d',full);
  const len=Math.PI*R*ASWEEP/180;
  prog.style.strokeDasharray=len;
  prog.style.strokeDashoffset=len;
  prog._len=len;
}
function setArcRaw(frac,color){
  const p=document.getElementById('arc-prog');
  p.style.strokeDashoffset=(p._len||1)*(1-Math.min(1,Math.max(0,frac)));
  if(color) p.style.stroke=color;
}
function cssVar(n){
  return getComputedStyle(document.documentElement).getPropertyValue(n).trim();
}
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

// ── Results store (populated as test completes) ──────────────
const results = { dl: null, ul: null, ping: null, jitter: null };
let activeTab = 'download'; // which stat the gauge currently shows

// ── Animation state ───────────────────────────────────────────
// Two independent channels animated in one RAF loop:
//   numTarget/numVal  → the big number display
//   arcTarget/arcVal  → arc fill fraction 0–1
let numTarget=0, numVal=0;
let arcTarget=0, arcVal=0;
let rafId=null, phase='idle';

function startLoop(){
  if(rafId) return;
  let last=performance.now();
  function tick(now){
    const dt=Math.min((now-last)/(1000/60),4); last=now;

    // Number channel — rises fast, falls slow
    const nd=numTarget-numVal;
    numVal+=nd*(1-Math.pow(1-(nd>0?.12:.05),dt));
    if(Math.abs(nd)<.001) numVal=numTarget;

    // Arc channel — constant smooth fill, always rises at same rate feel
    const ad=arcTarget-arcVal;
    arcVal+=ad*(1-Math.pow(1-(ad>0?.08:.15),dt));
    if(Math.abs(ad)<.0001) arcVal=arcTarget;

    // Render number
    const bn=document.getElementById('big-num');
    if(phase==='download'||phase==='upload'){
      bn.textContent=fmtMbps(numVal);
    } else if(phase==='ping'||phase==='jitter'){
      bn.textContent=numVal<.5?'—':numVal.toFixed(1);
    }

    // Render arc (color already set by setPhaseUI)
    setArcRaw(arcVal);

    rafId=requestAnimationFrame(tick);
  }
  rafId=requestAnimationFrame(tick);
}
function stopLoop(){ if(rafId){cancelAnimationFrame(rafId);rafId=null;} }

// Smoothly sweep arc from 0 to 1 over the measurement, driven by progress cb
// Returns a promise that resolves when arcVal reaches ~1
function sweepArc(color){
  arcTarget=0; arcVal=0;
  setArcRaw(0,color);
  document.getElementById('arc-prog').style.stroke=color;
}

// ── Formatters ────────────────────────────────────────────────
function fmtMbps(v){
  if(v==null||isNaN(v)) return '—';
  return v>=100?v.toFixed(0):v>=10?v.toFixed(1):v.toFixed(2);
}
function fmtMs(v){ return (v==null||isNaN(v))?'—':v.toFixed(1); }
function trunc(s,n){ return s&&s.length>n?s.slice(0,n-1)+'…':s||'—'; }

// ── UI helpers ────────────────────────────────────────────────
function flash(id,text,cls){
  const el=document.getElementById(id);
  el.textContent=text; el.className='sv'+(cls?' '+cls:'');
  el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash');
}

// Phase config: label text, color cssVar, unit label, number class
const PHASES={
  download:{ label:'DOWNLOAD', color:'--dl',  unit:'MBPS', cls:'dl'    },
  upload:  { label:'UPLOAD',   color:'--ul',  unit:'MBPS', cls:'ul'    },
  ping:    { label:'PING',     color:'--ping',unit:'MS',   cls:'ping'  },
  jitter:  { label:'JITTER',   color:'--ping',unit:'MS',   cls:'jitter'},
};

function setPhaseUI(p){
  phase=p;
  const cfg=PHASES[p]||{label:p.toUpperCase(),color:'--accent',unit:'',cls:''};
  const color=cssVar(cfg.color);
  document.getElementById('phase-lbl').className  =`phase-lbl ${cfg.cls}`;
  document.getElementById('phase-lbl').textContent=cfg.label;
  document.getElementById('big-num').className     =`big-num ${cfg.cls}`;
  document.getElementById('unit-lbl').className    =`unit-lbl ${cfg.cls}`;
  document.getElementById('unit-lbl').textContent  =cfg.unit;
  document.getElementById('arc-prog').style.stroke =color;
  return color;
}

function setProg(pct,label,cls){
  const fill=document.getElementById('prog-fill');
  fill.style.width=pct+'%';
  fill.className='prog-fill '+(cls||'');
  document.getElementById('prog-pct').textContent=Math.round(pct)+'%';
  if(label) document.getElementById('prog-lbl').textContent=label;
}
function setBadge(state){
  document.getElementById('status-badge').className='status-badge '+state;
  document.getElementById('sbdot').className='sbdot '+(state==='running'?'pulse':'');
  document.getElementById('status-lbl').textContent=
    state==='running'?'TESTING':state==='done'?'COMPLETE':'READY';
}
function setBtn(label,isRunning){
  const btn=document.getElementById('run-btn');
  btn.classList.toggle('running',isRunning);
  btn.innerHTML=`<span class="rdot ${isRunning?'on':''}" id="rdot"></span>${label}`;
}
function resetAll(){
  ['sv-dl','sv-ul','sv-ping','sv-jitter'].forEach(id=>{
    document.getElementById(id).textContent='—';
    document.getElementById(id).className='sv';
  });
  ['inf-isp','inf-org','inf-ip','inf-city','inf-country','inf-colo'].forEach(id=>{
    document.getElementById(id).textContent='—';
  });
  document.getElementById('big-num').textContent='—';
  document.getElementById('err-msg').textContent='';
  numTarget=0; numVal=0; arcTarget=0; arcVal=0;
  results.dl=null; results.ul=null; results.ping=null; results.jitter=null;
  activeTab='download';
  ['sv-dl','sv-ul','sv-ping','sv-jitter'].forEach(id=>{
    document.getElementById(id)?.closest('.stat')?.classList.remove('stat-active');
  });
}
function fillInfo(meta){
  if(!meta) return;
  // ipapi.co returns org as "AS1234 ISP Name" — strip the AS number for display
  const ispRaw = meta.isp || meta.org || '—';
  const ispClean = ispRaw.replace(/^AS\d+\s*/i, '');
  document.getElementById('inf-isp').textContent    = trunc(ispClean, 22);
  document.getElementById('inf-org').textContent    = trunc(ispRaw, 22);
  document.getElementById('inf-ip').textContent     = meta.ip      || '—';
  document.getElementById('inf-city').textContent   = meta.city    || '—';
  document.getElementById('inf-country').textContent= meta.country || '—';
  document.getElementById('inf-colo').textContent   = meta.colo    || '—';
}

// ── Wait until arc visually reaches target (for hold effect) ──
function waitArcSettle(target, timeoutMs=1800){
  return new Promise(resolve=>{
    const deadline=performance.now()+timeoutMs;
    function check(){
      if(Math.abs(arcVal-target)<.01||performance.now()>deadline) return resolve();
      requestAnimationFrame(check);
    }
    requestAnimationFrame(check);
  });
}

// ── Main test ─────────────────────────────────────────────────
let running=false, abortCtrl=null;
// ── Tab switching ────────────────────────────────────────────
window.showTab = function(tab) {
  if (!results[tab] && tab !== activeTab) return; // no data yet
  activeTab = tab;

  // Map tab → phase UI config
  const map = {
    dl:     { phase:'download', label:'DOWNLOAD', val: results.dl,     color:'--dl',   unit:'MBPS', fmt: v=>fmtMbps(v),  frac: v=>Math.min(1,v/1000) },
    ul:     { phase:'upload',   label:'UPLOAD',   val: results.ul,     color:'--ul',   unit:'MBPS', fmt: v=>fmtMbps(v),  frac: v=>Math.min(1,v/1000) },
    ping:   { phase:'ping',     label:'PING',     val: results.ping,   color:'--ping', unit:'MS',   fmt: v=>fmtMs(v),    frac: v=>Math.min(1,v/300)  },
    jitter: { phase:'jitter',   label:'JITTER',   val: results.jitter, color:'--ping', unit:'MS',   fmt: v=>fmtMs(v),    frac: v=>Math.min(1,v/100)  },
  };
  const cfg = map[tab];
  if (!cfg) return;

  setPhaseUI(cfg.phase);
  document.getElementById('phase-lbl').textContent = cfg.label;
  document.getElementById('unit-lbl').textContent  = cfg.unit;

  // Highlight active stat cell
  ['sv-dl','sv-ul','sv-ping','sv-jitter'].forEach(id => {
    document.getElementById(id).closest('.stat').classList.remove('stat-active');
  });
  const statMap = { dl:'sv-dl', ul:'sv-ul', ping:'sv-ping', jitter:'sv-jitter' };
  document.getElementById(statMap[tab])?.closest('.stat')?.classList.add('stat-active');

  if (cfg.val != null) {
    // Animate to the stored value
    numTarget = cfg.val;
    arcTarget = cfg.frac(cfg.val);
    document.getElementById('arc-prog').style.stroke = cssVar(cfg.color);
    if (!rafId) startLoop();
    // Stop loop once settled
    setTimeout(() => {
      numVal = numTarget; arcVal = arcTarget;
      document.getElementById('big-num').textContent = cfg.fmt(cfg.val);
      setArcRaw(arcVal);
      stopLoop();
    }, 600);
  }
};

window.toggleTest=function(){ running?abortTest():startTest(); };

function abortTest(){
  abortCtrl&&abortCtrl.abort();
  running=false; stopLoop();
  phase='idle';
  document.getElementById('phase-lbl').className='phase-lbl';
  document.getElementById('phase-lbl').textContent='ABORTED';
  document.getElementById('big-num').className='big-num';
  arcTarget=0; arcVal=0; setArcRaw(0);
  setProg(0,'IDLE'); setBadge('idle'); setBtn('RUN TEST',false);
}

async function startTest(){
  running=true; abortCtrl=new AbortController();
  resetAll(); buildArc(); setBadge('running'); setBtn('STOP TEST',true);
  startLoop();
  NexusEngine.fetchMeta().then(meta=>fillInfo(meta));

  try{

    // ════════════════════════════════════════════════
    // PHASE 1 — DOWNLOAD
    // Arc sweeps 0→1 driven by measurement progress.
    // Number counts up with each sample.
    // ════════════════════════════════════════════════
    setPhaseUI('download');
    numTarget=0; numVal=0; arcTarget=0; arcVal=0;
    setProg(0,'DOWNLOAD','dl');

    const dlSamples=[];
    const DL_TOTAL=NexusEngine.DL_TOTAL; // rounds * sizes
    await NexusEngine.measureDownload(
      bps=>{
        dlSamples.push(bps);
        numTarget=bps/1e6;  // show live speed
        flash('sv-dl',fmtMbps(NexusEngine.trimmedMean(dlSamples)/1e6),'dl');
      },
      (done,total)=>{
        arcTarget=done/total;          // arc tracks completion 0→1
        setProg((done/total)*100,'DOWNLOAD','dl');
      },
      abortCtrl.signal
    );
    if(abortCtrl.signal.aborted) return cleanup();

    // Arc to exactly 1, number to final result, hold briefly
    const dlFinal=NexusEngine.trimmedMean(dlSamples)/1e6;
    results.dl=dlFinal;
    arcTarget=1; numTarget=dlFinal;
    flash('sv-dl',fmtMbps(dlFinal),'dl');
    await waitArcSettle(1, 700);
    await sleep(400); // brief hold so user sees full arc

    // ════════════════════════════════════════════════
    // PHASE 2 — UPLOAD
    // ════════════════════════════════════════════════
    setPhaseUI('upload');
    arcTarget=0; arcVal=0; numTarget=0; numVal=0;
    setProg(0,'UPLOAD','ul');

    const ulSamples=[];
    await NexusEngine.measureUpload(
      bps=>{
        ulSamples.push(bps);
        numTarget=bps/1e6;
        flash('sv-ul',fmtMbps(NexusEngine.trimmedMean(ulSamples)/1e6),'ul');
      },
      (done,total)=>{
        arcTarget=done/total;
        setProg((done/total)*100,'UPLOAD','ul');
      },
      abortCtrl.signal
    );
    if(abortCtrl.signal.aborted) return cleanup();

    const ulFinal=NexusEngine.trimmedMean(ulSamples)/1e6;
    results.ul=ulFinal;
    arcTarget=1; numTarget=ulFinal;
    flash('sv-ul',fmtMbps(ulFinal),'ul');
    await waitArcSettle(1, 700);
    await sleep(400);

    // ════════════════════════════════════════════════
    // PHASE 3 — PING
    // Arc sweeps 0→1 over 8 latency rounds.
    // Number shows current RTT.
    // ════════════════════════════════════════════════
    setPhaseUI('ping');
    arcTarget=0; arcVal=0; numTarget=0; numVal=0;
    setProg(0,'PING');

    const lat=await NexusEngine.measureLatency((done,total,last)=>{
      numTarget=last;
      arcTarget=done/total;
      setProg((done/total)*100,'PING');
      document.getElementById('sv-ping').textContent=fmtMs(last);
    });
    if(abortCtrl.signal.aborted) return cleanup();

    results.ping=lat.avg;
    arcTarget=1; numTarget=lat.avg;
    flash('sv-ping',fmtMs(lat.avg));
    await waitArcSettle(1, 700);
    await sleep(400);

    // ════════════════════════════════════════════════
    // PHASE 4 — JITTER
    // We already have the jitter value from latency samples.
    // Animate the arc sweeping from 0→1 over 800ms while
    // the number counts up to the jitter value.
    // ════════════════════════════════════════════════
    setPhaseUI('jitter');
    arcTarget=0; arcVal=0; numTarget=0; numVal=0;
    setProg(0,'JITTER');

    // Animate jitter arc over ~1s in steps
    const jitterVal=lat.jitter;
    const JITTER_STEPS=20;
    for(let i=1; i<=JITTER_STEPS; i++){
      if(abortCtrl.signal.aborted) return cleanup();
      arcTarget=i/JITTER_STEPS;
      numTarget=jitterVal*(i/JITTER_STEPS);
      setProg((i/JITTER_STEPS)*100,'JITTER');
      await sleep(50);
    }
    results.jitter=jitterVal;
    arcTarget=1; numTarget=jitterVal;
    flash('sv-jitter',fmtMs(jitterVal));
    await waitArcSettle(1, 700);
    await sleep(400);

    // ════════════════════════════════════════════════
    // DONE — show download as final hero number
    // ════════════════════════════════════════════════
    stopLoop();
    running=false;
    setPhaseUI('download');
    arcTarget=Math.min(1,dlFinal/1000); arcVal=arcTarget;
    numTarget=dlFinal; numVal=dlFinal;
    setArcRaw(arcTarget, cssVar('--dl'));
    document.getElementById('big-num').textContent=fmtMbps(dlFinal);
    setProg(100,'DONE'); setBadge('done'); setBtn('RUN AGAIN',false);

    // Final flash all stats
    flash('sv-dl',    fmtMbps(dlFinal),'dl');
    flash('sv-ul',    fmtMbps(ulFinal),'ul');
    flash('sv-ping',  fmtMs(lat.avg));
    flash('sv-jitter',fmtMs(lat.jitter));

  }catch(e){
    if(e.name==='AbortError') return;
    document.getElementById('err-msg').textContent='TEST FAILED — CHECK CONNECTION';
    cleanup();
  }
}

function cleanup(){
  stopLoop(); running=false; setBadge('idle'); setBtn('RUN TEST',false);
}

// ── Theme ─────────────────────────────────────────────────────
window.toggleTheme=function(){
  const l=document.documentElement.classList.toggle('light');
  try{localStorage.setItem('nexus-theme',l?'light':'dark');}catch(e){}
  buildArc();
};

// ── Init ──────────────────────────────────────────────────────
(function(){
  try{
    if(localStorage.getItem('nexus-theme')==='light')
      document.documentElement.classList.add('light');
  }catch(e){}
  buildArc(); setArcRaw(0);
})();

</script>

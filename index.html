<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0a0a0a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="description" content="NEXUS — Minimal internet speed test"/>
<link rel="manifest" href="manifest.json"/>
<title>NEXUS — Speed Test</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-user-select:none;}
:root{
  --bg:#0a0a0a;--border:#1e1e1e;--accent:#e8ff47;
  --muted:#1c1c1c;--text:#f0f0f0;--dim:#555;--red:#ff4444;
  --dl:#47ffb2;--ul:#47c8ff;--ping:#e8ff47;
  --grid:rgba(255,255,255,0.013);
}
:root.light{
  --bg:#f4f4f4;--border:#d0d0d0;--accent:#111;
  --muted:#c8c8c8;--text:#111;--dim:#888;--red:#cc2222;
  --dl:#007a4d;--ul:#005fa3;--ping:#444;
  --grid:rgba(0,0,0,0.04);
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:'Space Mono',monospace;-webkit-font-smoothing:antialiased;touch-action:manipulation;}
body{display:flex;flex-direction:column;align-items:center;
  min-height:100svh;padding:0 18px 44px;overflow-x:hidden;position:relative;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:40px 40px;}
.header{width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:16px 0;position:relative;z-index:10;flex-shrink:0;}
.wordmark{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.35em;color:var(--dim);}
.status-badge{font-size:9px;letter-spacing:.15em;border:1px solid var(--border);
  color:var(--dim);padding:3px 10px;display:flex;align-items:center;gap:6px;transition:all .3s;}
.status-badge.running{background:var(--accent);border-color:var(--accent);color:#000;}
.status-badge.done{border-color:var(--accent);color:var(--accent);}
:root.light .status-badge.running{background:#111;border-color:#111;color:#fff;}
:root.light .status-badge.done{border-color:#111;color:#111;}
.sbdot{width:5px;height:5px;border-radius:50%;background:currentColor;}
.sbdot.pulse{animation:blink 1.2s ease infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.arc-wrap{position:relative;z-index:10;width:min(290px,86vw);margin-bottom:-20px;flex-shrink:0;}
#arc-svg{width:100%;height:auto;overflow:visible;}
#arc-track{transition:stroke .3s;}
#arc-prog{transition:stroke-dashoffset .28s cubic-bezier(.4,0,.2,1),stroke .35s ease;}
.num-block{text-align:center;line-height:1;position:relative;z-index:10;flex-shrink:0;}
.phase-lbl{font-size:9px;letter-spacing:.3em;color:var(--dim);text-transform:uppercase;
  margin-bottom:2px;min-height:13px;transition:color .3s;}
.phase-lbl.dl{color:var(--dl);}
.phase-lbl.ul{color:var(--ul);}
.phase-lbl.ping,.phase-lbl.jitter{color:var(--ping);}
.big-num{font-family:'Bebas Neue',sans-serif;font-size:clamp(84px,23vw,124px);
  font-style:italic;letter-spacing:-4px;color:var(--text);display:block;transition:color .4s;}
.big-num.dl{color:var(--dl);text-shadow:0 0 60px rgba(71,255,178,.12);}
.big-num.ul{color:var(--ul);text-shadow:0 0 60px rgba(71,200,255,.12);}
.big-num.ping,.big-num.jitter{color:var(--ping);text-shadow:0 0 60px rgba(232,255,71,.12);}
:root.light .big-num{text-shadow:none!important;}
.unit-lbl{font-size:10px;letter-spacing:.28em;color:var(--dim);
  margin-bottom:14px;display:block;transition:color .3s;}
.unit-lbl.dl{color:var(--dl);}
.unit-lbl.ul{color:var(--ul);}
.unit-lbl.ping,.unit-lbl.jitter{color:var(--ping);}
.stats{width:100%;display:grid;grid-template-columns:1fr 1px 1fr 1px 1fr 1px 1fr;
  border:1px solid var(--border);margin-bottom:10px;position:relative;z-index:10;flex-shrink:0;}
.sdiv{background:var(--border);}
.stat{padding:10px 5px;text-align:center;cursor:pointer;transition:background .2s;}
.stat:hover{background:rgba(255,255,255,.03);}
.stat-active{background:rgba(232,255,71,.05)!important;border-bottom:2px solid var(--accent);}
:root.light .stat:hover{background:rgba(0,0,0,.02);}
:root.light .stat-active{background:rgba(0,0,0,.04)!important;border-bottom:2px solid #111;}
.sv{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--text);
  display:block;line-height:1;margin-bottom:3px;transition:color .4s;}
.sv.dl{color:var(--dl);}
.sv.ul{color:var(--ul);}
.sl{font-size:7.5px;color:var(--dim);letter-spacing:.18em;text-transform:uppercase;}
.prog-row{width:100%;display:flex;align-items:center;gap:10px;margin-bottom:10px;
  position:relative;z-index:10;flex-shrink:0;}
.prog-lbl{font-size:9px;letter-spacing:.2em;color:var(--dim);white-space:nowrap;min-width:52px;}
.prog-track{flex:1;height:2px;background:var(--muted);}
.prog-fill{height:100%;background:var(--accent);width:0%;transition:width .4s ease,background .3s;}
.prog-fill.dl{background:var(--dl);}
.prog-fill.ul{background:var(--ul);}
.prog-pct{font-size:9px;color:var(--dim);min-width:30px;text-align:right;}
.info-panel{width:100%;border:1px solid var(--border);display:grid;
  grid-template-columns:1fr 1px 1fr;margin-bottom:10px;position:relative;z-index:10;flex-shrink:0;}
.info-col{padding:10px 12px;min-width:0;}
.info-row{display:flex;align-items:baseline;gap:6px;margin-bottom:5px;}
.info-row:last-child{margin-bottom:0;}
.info-label{font-size:7.5px;letter-spacing:.18em;color:var(--dim);
  text-transform:uppercase;white-space:nowrap;flex-shrink:0;}
.info-val{font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--text);
  letter-spacing:.05em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.info-val.accent{color:var(--accent);}
:root.light .info-val.accent{color:#111;}
.run-btn{width:100%;padding:14px;background:#e8ff47;border:1px solid #e8ff47;color:#000;
  font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.3em;cursor:pointer;
  transition:background .25s,color .25s,border-color .25s;text-transform:uppercase;
  position:relative;z-index:10;flex-shrink:0;}
:root.light .run-btn{background:#111;border-color:#111;color:#fff;}
.run-btn:active{transform:scale(.99);}
.run-btn.running{background:var(--bg);border:1px solid var(--border);color:var(--text);}
:root.light .run-btn.running{background:var(--bg);border-color:#bbb;color:#111;}
.rdot{width:6px;height:6px;border-radius:50%;background:var(--dim);display:inline-block;
  margin-right:8px;transition:background .3s;vertical-align:middle;}
.rdot.on{background:var(--accent);box-shadow:0 0 6px var(--accent);animation:blink 1.5s infinite;}
:root.light .run-btn .rdot.on{background:#e8ff47;box-shadow:0 0 6px #e8ff47;}
.err-msg{font-size:9px;color:var(--red);letter-spacing:.15em;text-align:center;
  margin-top:8px;min-height:14px;position:relative;z-index:10;}
#theme-btn{position:fixed;bottom:18px;left:18px;font-family:'Space Mono',monospace;
  font-size:12px;color:var(--dim);background:transparent;border:1px solid #2a2a2a;
  padding:8px 10px;cursor:pointer;transition:color .2s,border-color .2s;z-index:50;line-height:1;}
:root.light #theme-btn{border-color:#bbb;color:#555;}
#theme-btn:hover{color:var(--accent);border-color:var(--accent);}
@keyframes fadeSlide{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.flash{animation:fadeSlide .35s ease forwards;}
</style>
</head>
<body>

<div class="header">
  <div class="wordmark">NEXUS</div>
  <div class="status-badge" id="status-badge">
    <div class="sbdot" id="sbdot"></div>
    <span id="status-lbl">READY</span>
  </div>
</div>

<div class="arc-wrap">
  <svg id="arc-svg" viewBox="0 0 290 168">
    <path id="arc-track" d="" stroke="#1e1e1e" stroke-width="3" fill="none" stroke-linecap="butt"/>
    <path id="arc-prog" d="" stroke="#e8ff47" stroke-width="7" fill="none" stroke-linecap="round"
      stroke-dasharray="1" stroke-dashoffset="1"/>
  </svg>
</div>

<div class="num-block">
  <div class="phase-lbl" id="phase-lbl">TAP TO BEGIN</div>
  <span class="big-num" id="big-num">—</span>
  <span class="unit-lbl" id="unit-lbl">MBPS</span>
</div>

<div class="stats">
  <div class="stat" onclick="showTab('dl')" title="Show download"><span class="sv" id="sv-dl">—</span><span class="sl">↓ DOWN</span></div>
  <div class="sdiv"></div>
  <div class="stat" onclick="showTab('ul')" title="Show upload"><span class="sv" id="sv-ul">—</span><span class="sl">↑ UP</span></div>
  <div class="sdiv"></div>
  <div class="stat" onclick="showTab('ping')" title="Show ping"><span class="sv" id="sv-ping">—</span><span class="sl">PING MS</span></div>
  <div class="sdiv"></div>
  <div class="stat" onclick="showTab('jitter')" title="Show jitter"><span class="sv" id="sv-jitter">—</span><span class="sl">JITTER</span></div>
</div>

<div class="prog-row">
  <span class="prog-lbl" id="prog-lbl">IDLE</span>
  <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
  <span class="prog-pct" id="prog-pct">—</span>
</div>

<div class="info-panel">
  <div class="info-col">
    <div class="info-row"><span class="info-label">ISP</span><span class="info-val accent" id="inf-isp">—</span></div>
    <div class="info-row"><span class="info-label">ORG</span><span class="info-val" id="inf-org">—</span></div>
    <div class="info-row"><span class="info-label">IP</span><span class="info-val" id="inf-ip">—</span></div>
  </div>
  <div class="sdiv"></div>
  <div class="info-col">
    <div class="info-row"><span class="info-label">CITY</span><span class="info-val accent" id="inf-city">—</span></div>
    <div class="info-row"><span class="info-label">COUNTRY</span><span class="info-val" id="inf-country">—</span></div>
    <div class="info-row"><span class="info-label">SERVER</span><span class="info-val" id="inf-colo">—</span></div>
  </div>
</div>

<button class="run-btn" id="run-btn" onclick="toggleTest()">
  <span class="rdot" id="rdot"></span>RUN TEST
</button>
<div class="err-msg" id="err-msg"></div>
<button id="theme-btn" onclick="toggleTheme()">☀</button>

<script>
'use strict';

// ── Endpoints ────────────────────────────────────────────────
const CF_DOWN  = 'https://speed.cloudflare.com/__down';
const CF_UP    = 'https://speed.cloudflare.com/__up';
const CF_TRACE = 'https://speed.cloudflare.com/cdn-cgi/trace';

// Geo sources tried in order — first one that returns valid data wins
const GEO = [
  {
    url: 'https://ipapi.co/json/',
    parse(d) {
      if (!d || d.error || !d.city) return null;
      return { ip:d.ip||'—', isp:d.org||'—', org:d.org||'—', city:d.city||'—', country:d.country_name||d.country||'—' };
    }
  },
  {
    url: 'https://freeipapi.com/api/json',
    parse(d) {
      if (!d || !d.ipVersion) return null;
      return { ip:d.ipAddress||'—', isp:d.ispName||'—', org:d.ispName||'—', city:d.cityName||'—', country:d.countryName||'—' };
    }
  },
  {
    url: 'https://ipwho.is/',
    parse(d) {
      if (!d || !d.success) return null;
      return { ip:d.ip||'—', isp:d.connection?.isp||'—', org:d.connection?.org||d.connection?.isp||'—', city:d.city||'—', country:d.country||'—' };
    }
  },
];

// ── Test config ──────────────────────────────────────────────
const DL_SIZES   = [100000, 1000000, 5000000, 10000000, 25000000];
const UL_SIZES   = [100000, 1000000, 5000000, 10000000];
const LAT_ROUNDS = 8;
const BUDGET_MS  = 4500;
const MIN_ROUNDS = 3;

// ── Measurement engine ───────────────────────────────────────
async function measureLatency(onProg) {
  const s = [];
  for (let i = 0; i < LAT_ROUNDS; i++) {
    const t0 = performance.now();
    try { await fetch(`${CF_DOWN}?bytes=0&r=${Math.random()}`, { cache:'no-store', signal:AbortSignal.timeout(5000) }); } catch(_) {}
    s.push(performance.now() - t0);
    onProg && onProg(i+1, LAT_ROUNDS, s[s.length-1]);
    await sleep(50);
  }
  const avg = median(s);
  const jitter = s.reduce((a,b,i,arr) => i===0 ? 0 : a+Math.abs(b-arr[i-1]), 0) / Math.max(1, s.length-1);
  return { avg, jitter };
}

async function measureDownload(onSample, onProg, sig) {
  const out = []; let lastMs=0, done=0;
  for (const size of DL_SIZES) {
    if (sig?.aborted) break;
    if (done >= MIN_ROUNDS && lastMs > BUDGET_MS) break;
    const t0 = performance.now();
    try {
      const res = await fetch(`${CF_DOWN}?bytes=${size}&r=${Math.random()}`, { cache:'no-store', signal:combine(sig, AbortSignal.timeout(BUDGET_MS+1000)) });
      const buf = await res.arrayBuffer();
      lastMs = performance.now() - t0;
      const bps = (buf.byteLength*8)/(lastMs/1000);
      out.push(bps); done++;
      onSample && onSample(bps);
      onProg && onProg(done, DL_SIZES.length);
    } catch(e) { if(e.name==='AbortError') return out; done++; onProg&&onProg(done,DL_SIZES.length); }
    await sleep(60);
  }
  return out;
}

async function measureUpload(onSample, onProg, sig) {
  const out = []; let lastMs=0, done=0;
  for (const size of UL_SIZES) {
    if (sig?.aborted) break;
    if (done >= MIN_ROUNDS && lastMs > BUDGET_MS) break;
    const payload = new Uint8Array(size);
    crypto.getRandomValues(payload.slice(0, Math.min(size, 65536)));
    const t0 = performance.now();
    try {
      await fetch(CF_UP, { method:'POST', body:payload, cache:'no-store', signal:combine(sig, AbortSignal.timeout(BUDGET_MS+1000)) });
      lastMs = performance.now() - t0;
      const bps = (size*8)/(lastMs/1000);
      out.push(bps); done++;
      onSample && onSample(bps);
      onProg && onProg(done, UL_SIZES.length);
    } catch(e) { if(e.name==='AbortError') return out; done++; onProg&&onProg(done,UL_SIZES.length); }
    await sleep(60);
  }
  return out;
}

async function fetchMeta() {
  const r = { colo:'—', ip:'—', isp:'—', org:'—', city:'—', country:'—' };
  // Cloudflare trace — colo + raw IP (always works)
  try {
    const t = await (await fetch(CF_TRACE, { cache:'no-store', signal:AbortSignal.timeout(4000) })).text();
    r.colo = t.match(/colo=([A-Z]+)/)?.[1]?.trim() || '—';
    r.ip   = t.match(/ip=([^\n]+)/)?.[1]?.trim()   || '—';
  } catch(_) {}
  // Geo: try each source until one succeeds
  for (const src of GEO) {
    try {
      const d = await (await fetch(src.url, { cache:'no-store', signal:AbortSignal.timeout(5000) })).json();
      const parsed = src.parse(d);
      if (parsed) {
        // Strip AS number prefix e.g. "AS12345 ISP Name" → "ISP Name"
        parsed.isp = (parsed.isp||'').replace(/^AS\d+\s*/i, '') || '—';
        parsed.org = (parsed.org||'').replace(/^AS\d+\s*/i, '') || '—';
        Object.assign(r, parsed);
        break;
      }
    } catch(_) {}
  }
  return r;
}

// ── Utils ────────────────────────────────────────────────────
function median(a) { const s=[...a].sort((x,y)=>x-y), m=Math.floor(s.length/2); return s.length%2?s[m]:(s[m-1]+s[m])/2; }
function trimMean(a, f=0.15) {
  if (!a.length) return 0;
  const s=[...a].sort((x,y)=>x-y), cut=Math.floor(s.length*f), tr=s.slice(cut,s.length-cut||undefined);
  return (tr.length?tr:s).reduce((x,y)=>x+y,0)/(tr.length||s.length);
}
function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }
function combine(s1,s2) { if(!s1) return s2; return typeof AbortSignal.any==='function'?AbortSignal.any([s1,s2]):s1; }

// ── Arc ──────────────────────────────────────────────────────
const CX=145, CY=158, R=122, A0=215, A1=505, ASWEEP=290;
function polar(d,r){ const a=(d-90)*Math.PI/180; return {x:CX+r*Math.cos(a),y:CY+r*Math.sin(a)}; }
function arcD(s,e){ const p1=polar(s,R),p2=polar(e,R); return `M ${p1.x.toFixed(2)} ${p1.y.toFixed(2)} A ${R} ${R} 0 ${(e-s)>180?1:0} 1 ${p2.x.toFixed(2)} ${p2.y.toFixed(2)}`; }
function buildArc(){
  const light=document.documentElement.classList.contains('light');
  const tr=document.getElementById('arc-track'), pr=document.getElementById('arc-prog'), full=arcD(A0,A1);
  tr.setAttribute('d',full); tr.setAttribute('stroke',light?'#ccc':'#1e1e1e');
  pr.setAttribute('d',full);
  const len=Math.PI*R*ASWEEP/180;
  pr.style.strokeDasharray=len; pr.style.strokeDashoffset=len; pr._len=len;
}
function setArc(frac,color){
  const pr=document.getElementById('arc-prog');
  pr.style.strokeDashoffset=(pr._len||1)*(1-Math.min(1,Math.max(0,frac)));
  if(color) pr.style.stroke=color;
}
function cv(n){ return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }

// ── Animation ────────────────────────────────────────────────
let nT=0, nV=0, aT=0, aV=0, rafId=null, phase='idle';

function startLoop(){
  if(rafId) return;
  let last=performance.now();
  function tick(now){
    const dt=Math.min((now-last)/(1000/60),4); last=now;
    const nd=nT-nV; nV+=nd*(1-Math.pow(1-(nd>0?.12:.05),dt)); if(Math.abs(nd)<.001) nV=nT;
    const ad=aT-aV; aV+=ad*(1-Math.pow(1-(ad>0?.08:.15),dt)); if(Math.abs(ad)<.0001) aV=aT;
    const bn=document.getElementById('big-num');
    if(phase==='download'||phase==='upload') bn.textContent=fmtMbps(nV);
    else if(phase==='ping'||phase==='jitter') bn.textContent=nV<.5?'—':nV.toFixed(1);
    setArc(aV);
    rafId=requestAnimationFrame(tick);
  }
  rafId=requestAnimationFrame(tick);
}
function stopLoop(){ if(rafId){cancelAnimationFrame(rafId);rafId=null;} }
function waitSettle(target, ms=1800){
  return new Promise(res=>{ const d=performance.now()+ms; (function c(){ Math.abs(aV-target)<.01||performance.now()>d?res():requestAnimationFrame(c); })(); });
}

// ── Format ───────────────────────────────────────────────────
function fmtMbps(v){ if(v==null||isNaN(v)) return '—'; return v>=100?v.toFixed(0):v>=10?v.toFixed(1):v.toFixed(2); }
function fmtMs(v){ return (v==null||isNaN(v))?'—':v.toFixed(1); }
function trunc(s,n){ return s&&s.length>n?s.slice(0,n-1)+'…':(s||'—'); }

// ── Phase UI ─────────────────────────────────────────────────
const PH = {
  download:{ label:'DOWNLOAD', col:'--dl',   unit:'MBPS', cls:'dl'     },
  upload:  { label:'UPLOAD',   col:'--ul',   unit:'MBPS', cls:'ul'     },
  ping:    { label:'PING',     col:'--ping', unit:'MS',   cls:'ping'   },
  jitter:  { label:'JITTER',   col:'--ping', unit:'MS',   cls:'jitter' },
};
function setPhase(p){
  phase=p; const c=PH[p]||{label:p,col:'--accent',unit:'',cls:''};
  document.getElementById('phase-lbl').className  =`phase-lbl ${c.cls}`;
  document.getElementById('phase-lbl').textContent=c.label;
  document.getElementById('big-num').className    =`big-num ${c.cls}`;
  document.getElementById('unit-lbl').className   =`unit-lbl ${c.cls}`;
  document.getElementById('unit-lbl').textContent =c.unit;
  document.getElementById('arc-prog').style.stroke=cv(c.col);
}
function setProg(pct,label,cls){
  const f=document.getElementById('prog-fill');
  f.style.width=pct+'%'; f.className='prog-fill '+(cls||'');
  document.getElementById('prog-pct').textContent=Math.round(pct)+'%';
  if(label) document.getElementById('prog-lbl').textContent=label;
}
function setBadge(s){
  document.getElementById('status-badge').className='status-badge '+s;
  document.getElementById('sbdot').className='sbdot '+(s==='running'?'pulse':'');
  document.getElementById('status-lbl').textContent=s==='running'?'TESTING':s==='done'?'COMPLETE':'READY';
}
function setBtn(label,busy){
  const b=document.getElementById('run-btn'); b.classList.toggle('running',busy);
  b.innerHTML=`<span class="rdot ${busy?'on':''}" id="rdot"></span>${label}`;
}
function flash(id,text,cls){
  const el=document.getElementById(id); el.textContent=text; el.className='sv'+(cls?' '+cls:'');
  el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash');
}
function fillInfo(m){
  if(!m) return;
  document.getElementById('inf-isp').textContent    =trunc(m.isp,24);
  document.getElementById('inf-org').textContent    =trunc(m.org,24);
  document.getElementById('inf-ip').textContent     =m.ip||'—';
  document.getElementById('inf-city').textContent   =m.city||'—';
  document.getElementById('inf-country').textCont
